name: Build THGJB
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Theos
        run: bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
      - name: Install SDKs
        run: |
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C $THEOS/sdks --strip-components=1
      - name: Build
        run: |
          export THEOS=/Users/runner/theos
          export PATH=$PATH:$THEOS/bin
          make
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: ./packages/*.deb
          if-no-files-found: error

